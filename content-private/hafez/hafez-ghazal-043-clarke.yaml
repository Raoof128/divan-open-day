text:
  persian_lines:
    - صحن بستان ذوق‌بخش و صحبت یاران خوشست
    - وقت گل خوش باد کزوی وقت میخواران خوشست
  english_lines:
    - The court of the garden (the world) is joy-giving (producing manifestations of Love's glories); and the society of friends (the soul and the body that intervene between the seeker and the Sought), pleasant;
    - Pleasant, be the time of the rose (the Murshid), whereby the time of winedrinkers (lovers of God) is pleasant.
