  rationale: "The English verse portion is a close, largely line-by-line rendering of Nicholson section 812. Seven independent identifying anchors align, including the opening hemistich (mirror drawn from the side), the tinder/flint-and-steel image, the bone-setter with the broken leg, the vinegar/honey contrast, the Iblis \"ana khayr\" quotation, and the identical ordering of the tailor/carpenter/bone-setter/alchemist craft analogies. Candidate 21 (the guest's arrival at Joseph's) is the antecedent narrative section but contains none of the mirror-and-not-being verses; candidates 395, 823 and 853 match on the name Joseph only and were discarded on reading. The pairing is nonetheless abridged at both ends: Whinfield begins at \"He drew forth a mirror from his side\", compressing the Persian opening (Joseph demanding the gift, the guest's shame, \"carrying cumin to Kerman\", \"a grain to the mine\") into his English prose headnote, and he stops at the Iblis line, omitting roughly the last third of section 812 (the dung beneath the clear stream, the physician and the wound, the flies on the sore)."
