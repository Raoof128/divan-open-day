  disclosures:
    - Abridged translation. E. H. Whinfield renders the closing verses of this section but omits roughly fourteen intervening couplets, and one line (the proverb about the urn and the well) has no counterpart in the Persian. The opening sentence is the translator's own summary heading rather than translated verse.
  verifiedAt: 2026-07-16
  rationale: Segment s2 is the verse tail of Whinfield's STORY XIII. It aligns to Nicholson section 643 (شکایت گفتن پیرمردی به طبیب از رنجوریها و جواب گفتن طبیب او را), which contains both the old-man/physician dialogue and the closing polemic. Six independent identifying anchors match, four of them couplet-for-couplet; probe strings for all four appear in seq 643 and nowhere else in the corpus. Both ranked candidates (268, 731) were false positives matching on حکیم alone and were discarded after reading; 643 was located by searching the index directly. Disclosure is required because Whinfield omits roughly fourteen intervening couplets between the physician's rebuke and the mosque passage (the saint drunk with God, hell and heaven as his parts, "what comes not into thought, that is God"), and because one English line, the urn-and-well proverb, has no counterpart in the Persian and appears to be the translator's interpolation. The leading sentence "Bad principles always produce bad acts" is Whinfield's editorial gloss, not translated verse.
