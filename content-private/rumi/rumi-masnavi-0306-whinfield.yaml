  disclosures:
    - Abridged translation. The bulk of this passage corresponds to the Persian section on the afflicted gathering at Jesus's cloister; Whinfield condenses it and omits the Noah's-ark passage. The closing verses on false claims to sanctity are drawn from a different section of the Persian text.
  verifiedAt: 2026-07-16
  rationale: "The English segment's verse portion opens with the cloister-of-Jesus healing passage and tracks Nicholson section 306 (جمع آمدن اهل آفت ... بر در صومعه‌ی عیسی) hemistich-for-hemistich through the ingratitude reproach, the dog-of-the-Cave, the fidelity argument, the mother's claims versus God's, the evil-doubt passage, and the Jesus/Korah contrast. The correspondence is dense and identifying, not generic. Two qualifications. First, Whinfield abridges: he drops the Noah's-ark remembrance (یاد کن ... کشتی نوح) and compresses the expanded dogs-counselling-dogs lines. Second, the segment is not coextensive with section 306. English lines 2–78 correspond to 306; from the subheading \"How false pretensions to sanctity...\" onward (the tailor's test, Rustam, Junaid and Bayazid, David's iron, the sun on gold and the dry branch) the text corresponds instead to section 586 (رسیدن خواجه و قومش به ده ...). Section 306 is the dominant and unambiguous source for the majority of the segment, so I anchor there and disclose the tail rather than force a single-section claim."
