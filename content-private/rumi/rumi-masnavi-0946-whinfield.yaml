  rationale: "The ranked candidates were all wrong — they matched on مصطفی alone. Searching the index for the actual narrative objects (عقاب / موزه / مار) located seq 567, the eagle-and-boot story itself — but the target segment is not that narrative; it is the moral commentary following it. Grepping the Persian for the distinctive تصوف formula alongside the rose/thorn image found seq 946, \"وجه عبرت گرفتن ازین حکایت و یقین دانستن کی ان مع العسر یسرا\", whose title is precisely Whinfield's heading. Reading it confirms a strict twelve-beyt-to-twelve-couplet correspondence in identical order: address to the soul, counsel of acquiescence, pale-faced others versus the smiling rose, the rose's retort about the thorn, what is lost by decree, the Arabic تصوف couplet, the eagle as emblem of affliction, and the Arabic wolf proverb closing both. Five independent anchors, two of them verbatim Arabic interpolations, exceed the three-anchor bar. Segment s1 of this block is Whinfield's prose story-summary and would be excluded separately; s2 is verse throughout and rendered without abridgement, so no disclosure is warranted."
