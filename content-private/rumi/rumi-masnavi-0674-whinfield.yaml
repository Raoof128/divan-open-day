    - "This English text is E. H. Whinfield's abridged Victorian translation. It condenses the Persian, omitting several passages, and draws on two Nicholson sections rather than one: the bulk corresponds to \"عذر گفتن فقیر به شیخ\", while the closing lines correspond to the separate section \"بیان دعویی که عین آن دعوی گواه صدق خویش است\". Line-by-line correspondence with the Persian should not be assumed."
