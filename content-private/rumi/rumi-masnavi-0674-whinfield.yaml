  rationale: |-
    The ranked candidates were all wrong: they match on صوفی/قاضی alone and point to an unrelated judge-and-Sufi story. Searching the index directly located seq 674 (عذر گفتن فقیر به شیخ — the dervish excusing himself to the Shaikh), Whinfield's verse source for Story XVI. Anchors are numerous, rare and order-preserving: camel/mouse water proportion, four loaves with the duck simile, fifty-vs-six loaves, ten-vs-five-hundred prostrations, barefoot to the Ka'ba, the verbatim hadith عینای تنام لا ینام قلبی, Saturn in the seventh sphere, bird-vs-fly. Well beyond three independent anchors.

    Two caveats drive the disclosure. First, composite: the first two subsections render seq 674, but the closing subsection (thirsty man with the cup, mother and babe) renders a separate section, seq 186, which I read and confirmed; Whinfield crosses the seam unmarked. Seq 674 is dominant and is reported. Second, abridged: Whinfield omits the Persian passages on the unbounded mean (seven seas of ink), Ja'far Tayyar, and the shaikh vomiting pearls into the basin.
