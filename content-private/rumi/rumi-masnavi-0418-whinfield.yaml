  rationale: "The ranked candidates (194/297/324/350/351, Pharaoh-answers-Moses sections) were all wrong — they matched only the generic Moses/Pharaoh title words. Searching the index for اژدها/مارگیر found seq 418 (حکایت مارگیر ... آورد به بغداد, 182 lines), which I read in full. Its closing sixteen couplets, from نفست اژدرهاست او کی مرده است, correspond couplet-by-couplet and in the same order to Whinfield's 31 verse lines: frozen-not-dead lust; Pharaoh commanding the river; plundering a hundred Moseses and Aarons; worm under poverty / gnat through wealth; the frost of separation; the sun of Iraq; do-not-pity; the bat of vileness; الله یجزیک الوصال; the warmed snake's destruction; \"twenty times more than I have told\"; and the closing Moses-must-slay-dragons / hundred-thousand-slain pair. Eight independent anchors, several rare. The English block is mixed: Whinfield opens with his own prose précis of the Moses–Pharaoh narrative and a prose summary of the snake-catcher anecdote, then translates only the section's closing verse passage. The verse portion is a genuine close rendering; the surrounding prose is the abridger's connective tissue — hence disclosure rather than plain verification."
