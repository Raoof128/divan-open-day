  disclosures:
    - "Abridged translation. E. H. Whinfield renders this section closely but not completely: the English omits the section's closing couplets, and substitutes \"wasps\" for the Persian \"snake\" in the honeybee/serpent contrast. The block also opens with Whinfield's own prose summary of the surrounding story, which is not translated verse."
  verifiedAt: 2026-07-16
  rationale: "The verse portion of English block 205 (\"Why freewill is good for man\") corresponds couplet-by-couplet to Nicholson section 947, وحی آمدن از حق تعالی به موسی کی بیاموزش چیزی کی استدعا کند یا بعضی از آن — the divine reply within the Moses / language-of-animals cycle. Six independent identifying anchors align in the same sequence: the opening divine grant of ikhtiyar, the salt-of-worship metaphor, the sword/ghazi-or-brigand test, the karramna + halved-Adam contrast, the prison-makes-ascetics argument, and the closing capital/reckoning figure. The ranked candidates (350, 107, 65, 194, 949) all matched on موسی alone and are unrelated — I located 947 by searching the Persian for کرمنا together with زنبور. Disclosure is warranted because the English block prefixes the verse with Whinfield's own prose plot summary, he renders نیم مار (\"half a snake\") as \"wasps\" and normalizes the snake/wasp imagery throughout, and he drops the concluding couplets (آدمی بر خنگ کرمنا سوار onward, and Moses's renewed warning) that close the Persian section."
