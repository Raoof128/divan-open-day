  rationale: "The ranked candidates were all false positives from the token باز (here \"again\", not \"falcon\"); I discarded them and searched the Persian for جغد, locating section 357 (حسد کردن حشم بر غلام خاص). That section carries the falcon-among-owls parable (lines 168-259) and then, at lines 260-283, the exact verse Whinfield heads \"The right use of forms\": نفریبد شما را شکل من → \"That my outward form may not mislead you\"; صورت راه زد ... بر الله زد → \"aimed at form, and found Allah\"; the eye/fat, heart/blood-drop, kidneys/liver, reason-candle-in-brain series; the Universal/Partial Soul, the pearl in the bosom, Mary, the two Messiahs, the world begetting worlds, and the closing \"till the Last Day I could not count\". Six independent anchors, several of them rare conceits, in identical sequence. The correspondence is real but not a whole-section pairing: the English verse renders only a 24-line run inside a 290-line Persian discourse, and Whinfield's 28 English lines include roughly two couplets (e.g. \"Smell in the nostrils and speech in the tongue\") without counterpart in the Nicholson text."
