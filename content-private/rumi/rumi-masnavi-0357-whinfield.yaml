  disclosures:
    - This English passage is E. H. Whinfield's abridged Victorian translation. It renders a contiguous excerpt (lines 260-283) from a much longer Persian section; the surrounding story is compressed into English prose elsewhere in the block, and one or two English couplets have no counterpart in the Nicholson-aligned Persian text.
