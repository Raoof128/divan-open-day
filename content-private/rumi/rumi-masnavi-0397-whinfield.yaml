  disclosures:
    - This English passage is E. H. Whinfield's abridged translation. It renders only the closing discourse of the Persian section (from "Worldly senses are the ladder of earth" onward), omitting the verse narrative of the parrot — summarised separately as prose — and a substantial intervening passage of the discourse. The subheading "Confusion of saints with hypocrites" is the translator's addition and does not appear in the Persian.
  verifiedAt: 2026-07-16
  rationale: |-
    Block 23 is a prose retelling of the Oilman-and-Parrot story followed by a 46-line verse discourse; s2 is the verse discourse only, so it is translated verse, not commentary. It matches the closing discourse of Nicholson section 397 (Book 1). Correspondence is exceptionally tight: twelve distinct images in identical order with no transposition, including anchors identifying nothing else in the Masnavi (Musaylima vs Muhammad, the woollen lion, the spear-head cut from flesh, the two ladders). Generic material (wine, musk, love of God) was disregarded.

    Disclosure is needed because the pairing is abridged, not direct: the English verse begins at char 3042 of a 4177-char section, rendering only the final ~27%. Whinfield omits the verse narrative of the parrot (compressed into English prose above) and roughly 1,100 characters of intervening discourse, including the bees/deer/reeds comparisons, Moses' magicians, the monkey and the touchstone. The subheading is Whinfield's own.

    Section choice: seq 5 has near-identical text but a colloquial title in a scrambled front run; 397 carries the canonical Nicholson heading inside a contiguous Nicholson-headed Book 1 run.
