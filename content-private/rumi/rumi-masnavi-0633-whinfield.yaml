  disclosures:
    - "The translated verse corresponds closely, couplet by couplet and in the same order, to Nicholson section 633. Two differences: the block is preceded by the translator's own English prose summary of the surrounding frame story, which is not translated verse; and the final few couplets of the English continue past the end of this Persian section into adjoining material."
  verifiedAt: 2026-07-16
  rationale: "Candidate 633 is correct, verified by reading rather than by the title hint. The English verse tracks the Persian couplet-for-couplet from the ambassador's vocative through the soul's ascent to the Throne, in identical order, sharing well over three non-generic anchors: the امیرالممنین address, the boundless bird in the cage, cotton stuffed in the ear of the soul, raindrop-into-pearl inside the shell, the musk-deer's navel (blood without, musk within), the copper/elixir alembic, bread inert on the cloth but spirit in the body, and the Farhad / انشق القمر couplet. Two qualifications require disclosure rather than a plain direct verdict. First, the block opens with Whinfield's own English prose summary of the frame story (the hare, the envoy from Rum, Omar under the palm-tree), which is editorial argument with no Persian counterpart here. Second, the English runs about four couplets past the end of section 633 (\"If tongue discourses of hidden mysteries\" through \"hell or 'The Friend'\"), continuing into adjoining material I could not locate in this section. The verse body itself is unusually faithful for Whinfield — nearer line-by-line than abridgement."
