  rationale: The English verse in this segment is not the lion/wolf/fox narrative named in the story heading — that is the preceding prose summary — but the door-knocking anecdote appended under the tagline "Till man destroys 'self' he is no true friend of God." The ranked candidate (seq 594, رفتن گرگ و روباه...) therefore covers only the prose frame, not this verse, and was discarded. Searching the Persian for «در یاری بزد» / «معتمد» located section 724, whose heading is itself the story of the man who knocked at a friend's door and was told "since thou art thou, I open to no one." All twenty English lines map couplet-by-couplet onto the section's first nine couplets in identical order, with eight independent identifying anchors (ای معتمد, the raw-at-the-feast table, hijr/firaq → نفاق, the one-year journey, the hundred-fold fear of an unmannerly word, ای دلستان, and the "two I's in one house" close). The Persian section then continues for many further couplets (the needle-and-thread, the camel and the needle's eye, the three armies, کاف و نون) which Whinfield omits entirely — hence abridged rather than direct.
