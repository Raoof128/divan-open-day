  disclosures:
    - This English passage corresponds line-for-line to the Persian section, but appears under a translator-supplied subheading; the Nicholson edition places these verses under a narrative heading about the merchant and the parrots of Hindustan. One couplet is translated freely, substituting a sea-and-pearls image for the Persian rose-from-fire.
  verifiedAt: 2026-07-16
  rationale: "The five ranked candidates were title-matched on طوطی/بازرگان and are all parrot-narrative sections; none contains this discourse. I discarded them and searched the Persian directly for the Nimrod/Abraham couplet, which resolves uniquely to section 557. That section is 24 lines (12 couplets) and maps couplet-for-couplet onto the 24 English lines, in identical order, with no omission — a complete verse rendering, not an abridgement. Anchors are numerous and independent: Nimrod+Abraham; the earth-to-gold/gold-to-dust inversion; صاحب دل eating زهر قاتل; the Prophet's warning against مری; hand-of-God vs hand-of-Satan-and-demons; the closing پیاده با سوار vocative. Well above the three-anchor bar. Two points warrant disclosure rather than a bare verified: (a) Nicholson's heading here is narrative (the merchant seeing the parrots of Hindustan) while the content is entirely discourse — \"Saints are preserved from all harm\" is Whinfield's own subheading, so heading text does not corroborate the pairing; (b) one couplet is rendered freely — او ز آتش ورد احمر آورد (\"brings the red rose out of fire\") becomes \"A swimmer brings pearls from the deep sea\". Neither affects the identification."
