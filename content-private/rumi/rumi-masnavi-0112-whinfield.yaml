  disclosures:
    - Abridged translation. The English begins partway into the Persian section, omitting the opening couplets on the physician's examination (summarised as prose in the translator's introduction to the story), and adds editorial subheadings not present in the source. The verse that follows corresponds closely and in order.
  verifiedAt: 2026-07-16
  rationale: "Persian section 112 ('بردن پادشاه آن طبیب را بر بیمار...', 84 lines) matches this English segment couplet-for-couplet and in order: astrolabe of God's mysteries, the self-splitting pen, reason as an ass in mire, sun-proves-the-sun, انشق‌القمر, the Sun of the soul with no yesterday, then the Shams of Tabriz dialogue (fourth heaven bowing, Yusuf's shirt, the Arabic وقت سیف قاطع and صوفی ابن‌الوقت couplets, the veil/coverlet exchange, blade of grass vs mountain), closing on the same final couplet. Whinfield is unusually close here — not paraphrase. Divergence: the English starts at 'A true lover is proved such by his pain of heart', omitting the section's opening ~7 couplets on the physician examining pulse and complexion; Whinfield absorbed those into the block's prose story-summary. He also inserts editorial subheadings absent from the Persian. Ranked candidates (1, 2, 451, 464, 68) were title-word noise: seq 2 is the story's opening narrative, seq 1 an aggregate block. Verified by reading the Persian directly."
