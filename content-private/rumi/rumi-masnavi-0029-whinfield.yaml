  rationale: "Nicholson section 29 (اختلاف کردن در چگونگی و شکل پیل) contains the segment's verse from its first couplet onward in the same order, with far more than three independent anchors: the palm-of-hand figure, the sea/foam antithesis, the Moses-and-Jesus question, the Adam-and-Eve bowstring, the triple 'dam mazan' imperative, and the full Noah/Canaan exchange down to the wave striking Canaan's head. The candidate list's other entries (97, 402, 312) are hare-and-elephant fables matching only on the word پیل and were discarded on reading. The pairing is not one-to-one, however: Whinfield abridges within section 29 (omitting the world-as-tree / half-ripe fruit passage and the 'تو یکی تو نیستی' sequence), and his segment runs past that section's end into further material — the reconciliation of the two traditions on acquiescence in infidelity, and the half-gray beard / barber and Zaid anecdotes, the latter being Nicholson section 845 (مثل در بیان آنک حیرت مانع بحث و فکرتست). Section 29 is therefore the primary source but not the sole one, so the correspondence is composite and abridged rather than direct."
