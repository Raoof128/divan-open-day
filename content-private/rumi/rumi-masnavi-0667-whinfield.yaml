  disclosures:
    - Whinfield's translation is abridged and freely amplified here. He omits sixteen consecutive couplets of the Persian (a digression on deficient knowledge and lightning) and expands Rumi's six-couplet "through love" catalogue to eleven couplets, adding image-pairs (thorns/roses, stake/throne, devil/houri, lions/mice and others) that do not appear in the Nicholson-aligned Persian text. The English block's opening prose is Whinfield's own summary, not translated verse, and its heading corresponds to a different Persian section from the verse translated.
