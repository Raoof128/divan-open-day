  disclosures:
    - English text is E. H. Whinfield's abridged Victorian translation. It follows this Persian section couplet-for-couplet and in order, but includes several additional couplets that fall outside the bounds of this section. The tattoo story named in the English heading is narrated separately as prose and belongs to a different Persian section.
  verifiedAt: 2026-07-16
  rationale: "Whinfield's block 55 contains two distinct units: a prose retelling of the Qazwini tattoo story (which corresponds to Persian seq 785, کبودی زدن قزوینی) and then a discrete verse discourse under the heading \"The Prophet's counsels to 'Ali\". Segment s2 is that verse discourse, and it maps to Persian seq 959 (وصیت کردن رسول ... مر علی را) essentially couplet-for-couplet in unbroken order. Anchors are numerous, specific and non-generic: the Lion-of-God address to Ali, Mount Qaf paired with the Simurgh, Moses under Khizr with the staved boat and the slain child, the Qur'anic \"yad Allah fawqa aydihim\", the absent-versus-present saints argument, and the closing polished-mirror question. This far exceeds the three-anchor threshold. The one caveat requiring disclosure: Whinfield's English runs roughly 31 couplets against 22 bayts in this Nicholson section, so several English couplets (e.g. \"palm-trees of the Truth\", \"thorn a bed of roses\", \"sun of the spirit\") have no counterpart within seq 959 itself and likely reflect adjacent lines or a fuller recension. The verified core is not in doubt."
