  rationale: "All four ranked candidates are elephant sections and are wrong: they were ranked on پیل, which appears nowhere in s4. (Candidate seq 29 does match sibling segment s2, verified by reading it.) Running the repo's classifier on block 171 shows s4 is a distinct verse run introduced by the heading captured as s3, \"Reconciliation of the two traditions\". Searching the index found seq 300, whose title literally translates that heading, and whose 28 hemistichs correspond one-to-one and in order to s4's first 28 lines — past the three-anchor bar on named-hadith, technical-argument, and rare-analogy grounds that identify nothing else in the Masnavi. Over that span the rendering is direct, not abridged. But s4's remaining 30 lines are the half-gray-beard/barber and Zaid-blow anecdotes, which I traced to a separate section, seq 845 (مثل در بیان آنک حیرت مانع بحث و فکرتست), plus a short tail beyond it. The segment spans multiple Persian sections because the intervening \"Bewilderment\" title had no prose anchor and stayed inside the verse run — the limit documented in splitTitlesAfterProse. Hence composite with disclosure, not direct."
