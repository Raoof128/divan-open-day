name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Never cancel a main-branch run: the release protocol tags a merge commit
  # only after confirming CI was green for it, and a cancelled run leaves a
  # main commit with no result that a tag could still be cut from. PR runs keep
  # the cancellation saving.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  osv-scan:
    name: OSV dependency scan
    # The pinned reusable workflow declares `actions: read` and
    # `security-events: write` in its own permissions block; a caller that
    # grants less makes GitHub refuse the whole run at startup
    # (startup_failure, no jobs, no signal). These grants are scoped to the
    # scan job only — the quality gate keeps `contents: read`.
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@8dc09193bb540e09b23da07ad7e30bd33bf87018
    with:
      scan-args: |-
        --lockfile=pnpm-lock.yaml
      upload-sarif: false
      fail-on-vuln: true

  quality-gate:
    name: Quality gate
    needs: osv-scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # v4 persists the job token in .git/config for the whole job, where
          # any later step -- including anything pnpm install or Playwright runs
          # -- can read it. CI never pushes, so it does not need the credential.
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      # DIVAN_OSV_SCAN_COMPLETED is deliberately NOT set. It used to suppress
      # `pnpm audit` here on the grounds that the osv-scan job already covered
      # dependencies. That made the only dependency control fail-open: the
      # pinned reusable workflow runs its scanner with `continue-on-error: true`
      # and its reporter exits 0 even when no results file was produced, so a
      # scanner error yields a green `osv-scan`, a satisfied `needs:`, and zero
      # dependency scanning. Letting `pnpm audit --prod` run underneath restores
      # a fail-closed backstop that does not depend on upstream behaviour.
      - name: Run quality gate
        run: bash scripts/check.sh --ci

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
